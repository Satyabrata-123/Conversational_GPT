services:
  mysql:
    image: mysql:8.0.45-debian
    container_name: satya-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Satya@123
      MYSQL_DATABASE: satya_gpt_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./Satya_Gpt
    container_name: satya-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/satya_gpt_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Satya@123
    depends_on:
      - mysql

  frontend:
    build: ./ConversationalUI-main/ConversationalHistory-UI
    container_name: satya-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data: